version: 2

sources:
  - name: healthcare_raw
    database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
    schema: "{{ env_var('SNOWFLAKE_SCHEMA') }}"
    tables:
      - name: PATIENTS
        columns:
          - name: PATIENT_ID
            tests:
              - unique
              - not_null
          - name: FIRST_NAME
          - name: LAST_NAME
          - name: DATE_OF_BIRTH
          - name: GENDER
          - name: ADDRESS
          - name: PHONE
      - name: VISITS
        columns:
          - name: VISIT_ID
            tests:
              - unique
              - not_null
          - name: PATIENT_ID
            tests:
              - not_null
          - name: VISIT_DATE
          - name: DIAGNOSIS
          - name: COST