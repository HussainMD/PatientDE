version: 2

sources:
  - name: healthcare_raw
    database: HEALTHCARE_DB
    schema: RAW
    tables:
      - name: patients
        columns:
          - name: patient_id
            tests:
              - unique
              - not_null
          - name: first_name
          - name: last_name
          - name: date_of_birth
          - name: gender
          - name: address
          - name: phone
      - name: visits
        columns:
          - name: visit_id
            tests:
              - unique
              - not_null
          - name: patient_id
            tests:
              - not_null
          - name: visit_date
          - name: diagnosis
          - name: cost